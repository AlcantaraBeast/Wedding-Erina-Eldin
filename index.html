<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldin & Erina</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
/* GLOBAL */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:black;
  overflow:hidden;
}

/* INTRO */
.intro{
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  color:white;
  text-align:center;
  z-index:10;
  overflow:hidden;
}

.introText{
  font-family:'Great Vibes';
  font-size:48px;
  opacity:0;
  transition:opacity 1.5s ease;
  text-shadow:0 0 20px rgba(255,255,255,.8),0 0 40px rgba(255,215,0,.6);
}

.datePart{
  font-family:'Great Vibes';
  font-size:120px;
  opacity:0;
  transform:translateY(40px);
  transition:all 1.2s ease;
  text-shadow:0 0 20px rgba(255,255,255,.8),0 0 40px rgba(255,215,0,.6);
}

.datePart.show{
  opacity:1;
  transform:translateY(0);
}

.datePart.move{
  transform:translateY(-40px);
}

.month{
  font-size:90px;
}

.year{
  font-size:100px;
}

/* SPARKS BACKGROUND */
.spark-container{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:-1;
}
.spark{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 6px white,0 0 12px gold;
  animation:sparkFloat 6s linear infinite;
  opacity:.8;
}
@keyframes sparkFloat{
  0%{transform:translateY(0) scale(1); opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-100vh) scale(0.5); opacity:0;}
}

/* MAIN PAGE */
.main{
  display:none;
  min-height:100vh;
  background:linear-gradient(#fff,#ffe8ec);
  text-align:center;
  padding-top:60px;
  position:relative;
  overflow:hidden;
}

/* SINGLE ROSE BACKGROUND */
.rose-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url("images/backgroundroses.png");
  background-size:cover;
  background-position:center center;
  opacity:0.5; /* 50% providnost */
  pointer-events:none;
  z-index:0;
}

/* HEARTS */
.heart{
  position:fixed;
  bottom:-20px;
  color:#d62839;
  font-size:18px;
  animation:float 8s linear infinite;
  opacity:.8;
  z-index:1;
}
@keyframes float{
  0%{transform:translateY(0); opacity:0;}
  30%{opacity:1;}
  100%{transform:translateY(-110vh); opacity:0;}
}

/* HEADER */
.names{
  font-family:'Great Vibes';
  font-size:72px;
  color:#b11226;
  position:relative;
  z-index:2;
}
.date{
  font-size:40px;
  margin-top:10px;
  color:#b11226;
  text-shadow:0 0 20px rgba(177,18,38,.6);
  animation:pulse 2s infinite;
  position:relative;
  z-index:2;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

/* DETAILS - VERTICAL CARDS */
.details{
  margin:40px auto;
  display:flex;
  flex-direction:column; /* vertikalno jedna ispod druge */
  align-items:center;
  gap:20px;
  max-width:320px; /* iste širine */
  padding:0 10px;
  position:relative;
  z-index:2;
}
.card{
  background:transparent; /* transparentno */
  border:2px solid #b11226; /* vidljiv okvir */
  border-radius:16px;
  padding:20px;
  font-size:20px;
  width:100%; /* sve iste širine */
  text-align:center;
}

/* FOOTER */
.footer{
  margin:60px 20px;
  font-size:20px;
  color:#333;
  position:relative;
  z-index:2;
}

/* MEDIA QUERIES */
@media (max-width:768px){
  .introText{ font-size:32px; }
  .datePart{ font-size:60px; }
  .month{ font-size:50px; }
  .year{ font-size:60px; }
  .names{ font-size:48px; }
  .date{ font-size:28px; }
  .details{ max-width:90%; gap:15px; }
  .card{ padding:14px; font-size:16px; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="spark-container" id="sparkContainer"></div>
  <div id="text1" class="introText">Svaka velika priča ima svoj početak…</div>
  <div id="text2" class="introText">Naša počinje ovdje</div>
  <div id="d" class="datePart">18.</div>
  <div id="m" class="datePart month">April</div>
  <div id="y" class="datePart year">2026</div>
</div>

<!-- MAIN PAGE -->
<div class="main" id="main">
  <div class="rose-bg"></div>
  <div class="names">Eldin & Erina</div>
  <div class="date">18.04.2026</div>
  <div class="details">
    <div class="card">Okupljanje<br><strong>13:00h</strong></div>
    <div class="card">Vjenčanje<br><strong>15:00h</strong><br>Općina Vareš</div>
    <div class="card">Šerijatsko vjenčanje<br><strong>15:45h</strong></div>
    <div class="card">Svadbeno slavlje<br><strong>17:00h</strong><br>Svadbeni salon Leyla Podlugovi</div>
  </div>
  <div class="footer">Radujemo se što ćete biti dio našeg posebnog dana ❤️</div>
</div>

<script>
// INTRO ANIMATION
const text1 = document.getElementById("text1")
const text2 = document.getElementById("text2")
const d = document.getElementById("d")
const m = document.getElementById("m")
const y = document.getElementById("y")

setTimeout(()=>{ text1.style.opacity=1 }, 800)
setTimeout(()=>{ text1.style.opacity=0 }, 4800)
setTimeout(()=>{ text2.style.opacity=1 }, 5000)
setTimeout(()=>{ text2.style.opacity=0 }, 8800)
setTimeout(()=>{ d.classList.add("show") }, 9000)
setTimeout(()=>{ d.classList.add("move"); m.classList.add("show") }, 10500)
setTimeout(()=>{ m.classList.add("move"); y.classList.add("show") }, 12000)
setTimeout(()=>{
  document.getElementById("intro").style.opacity=0
  setTimeout(()=>{
    document.getElementById("intro").style.display="none"
    document.getElementById("main").style.display="block"
    document.body.style.overflow="auto"
    startHearts()
  },1000)
}, 13500)

// HEART ANIMATION
function startHearts(){
  setInterval(()=>{
    const heart=document.createElement("div")
    heart.className="heart"
    heart.innerHTML="❤"
    heart.style.left=Math.random()*100+"vw"
    document.body.appendChild(heart)
    setTimeout(()=>heart.remove(),8000)
  },700)
}

// SPARKS ANIMATION
function startSparks(){
  setInterval(()=>{
    const spark=document.createElement("div")
    spark.className="spark"
    spark.style.left=Math.random()*100+"vw"
    spark.style.top="100vh"
    spark.style.animationDuration=(4+Math.random()*4)+"s"
    document.getElementById("sparkContainer").appendChild(spark)
    setTimeout(()=>spark.remove(),8000)
  },120)
}
startSparks()
</script>

</body>
</html>
